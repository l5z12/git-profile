version: 2

project_name: git-profile

builds:
  - id: git-profile
    binary: git-profile
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.CommitHash={{.Commit}}
      - -X main.CompileDate={{.Date}}

archives:
  - id: git-profile
    ids:
      - git-profile
    files:
      - LICENSE*
      - README*
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ title .Os }}{{ end }}-
      {{- if eq .Arch "all" }}all
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

source:
  enabled: true

brews:
  - name: git-profile
    ids:
      - git-profile
    homepage: https://github.com/dotzero/git-profile
    description: Git Profile allows to add and switch between multiple user profiles
    license: MIT

    repository:
      owner: dotzero
      name: homebrew-tap

    commit_author:
      name: dotzero
      email: mail@dotzero.ru

    install: |

release:
  github:
    owner: dotzero
    name: git-profile
